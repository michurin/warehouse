<html>
<head>
  <title>MinWord</title>
  <style>
* {
  font-family: "Gill Sans", sans-serif;
}
a {
  color: #050;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
b {
  border: 1px solid #050;
  padding: 2px;
  border-radius: 3px;
}
form {
  margin: 0;
  padding: 0;
}
input {
  outline: none;
}
div {
  display: inline-block;
  border: 1px solid #f00;
  padding: 1em;
}
tt {
  font-family: monospace;
  border: 1px solid #999;
  padding: 1px 0.3em;
  margin: 1px 0.3em;
  background-color: #fff;
}
  </style>
  <meta name="viewport" content="initial-scale=1.2, maximum-scale=1.2, minimum-scale=1.2, user-scalable=no">
</head>
<body align="center">
<h1>Enter</h1>
<p><a href="/main">main channel</a></p>
<p>
personal channel
<form>
  <input type="text"></input><button type="submit">&gt;</button>
</form>
</p>
<div>Allowed symbols:<br>
  <tt>a</tt>–<tt>z</tt>, <tt>A</tt>–<tt>Z</tt>, <tt>0</tt>–<tt>9</tt>, <tt>_</tt>, <tt>-</tt>
</div>
<script>
  const eForm = document.getElementsByTagName('form')[0]
  const eInput = document.getElementsByTagName('input')[0]
  const eAllert = document.getElementsByTagName('div')[0]

  function updateAlert() {
    const text = eInput.value
    const room = text.replaceAll(/[^0-9a-zA-Z_-]+/g, '')
    if (room !== text) {
      eAllert.style.backgroundColor = '#ff0'
    } else {
      eAllert.style.backgroundColor = ''
    }
  }

  eInput.onkeyup = updateAlert
  eForm.onsubmit = (e) => {
    e.preventDefault()
    const text = eInput.value
    const room = text.replaceAll(/[^0-9a-zA-Z_-]+/g, '')
    if (room === text && room !== '') {
      location.href = '/'+room
    } else {
      eInput.value = room
      updateAlert()
    }
  }
</script>
</body>
</html>
