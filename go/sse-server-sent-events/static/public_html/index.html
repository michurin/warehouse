<html>
<head>
  <title>MinWord</title>
  <link rel="stylesheet" href="styles.css"></link>
  <meta name="viewport" content="initial-scale=1.2, maximum-scale=1.2, minimum-scale=1.2, user-scalable=no">
</head>
<body>
  <div id="body">
    <div id="board"></div>
    <div class="control">
      <input id="input" type="text" inputmode="search" autocomplete="off" enterkeyhint="done"></input>
      <div id="send">⏎</div>
    </div>
    <div class="control">
      <input id="name" type="text"></input>
      <div id="color-wrapper"><input id="color" type="color"></input></div>
      <div id="status"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
