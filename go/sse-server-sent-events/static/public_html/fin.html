<html>
<head>
  <title>MinWord</title>
  <style>
* {
  font-family: "Gill Sans", sans-serif;
}
a {
  color: #050;
  text-decoration: none;
}
a:hover {
  text-decoration: underline;
}
b {
  border: 1px solid #050;
  padding: 2px;
  border-radius: 3px;
}
  </style>
  <meta name="viewport" content="initial-scale=1.2, maximum-scale=1.2, minimum-scale=1.2, user-scalable=no">
</head>
<body align="center">
<h1>Bye</h1>
<p>timeout</p>
<p><a href="/">back to room <b></b></a></p>
<script>
  const params = new URLSearchParams(window.location.search)
  const room = params.get('back')
  if (room) {
    const r = room.replaceAll(/[^0-9a-zA-Z_-]+/g, '')
    document.getElementsByTagName('b')[0].innerText = r
    document.getElementsByTagName('a')[0].href = '/' + r
  }
</script>
</body>
</html>
